<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>表情镜 · Meme Mirror</title>
<style>
  :root{
    --ink:#1c1b1f;
    --paper:#fdf6ec;
    --stamp:#c0392b;
    --stamp-dark:#8e2a1f;
    --gold:#d9a441;
    --line:#2b2a28;
    --muted:#8a8378;
    --green:#4caf50;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--paper);
    background-image:radial-gradient(circle at 1px 1px, rgba(0,0,0,0.05) 1px, transparent 0);
    background-size:18px 18px;
    color:var(--ink);
    font-family:"Songti SC","STSong","Noto Serif SC",serif;
    min-height:100vh;
    padding:28px 18px 60px;
  }
  .wrap{max-width:1080px;margin:0 auto;}
  header{text-align:center;margin-bottom:22px;}
  header h1{
    font-size:clamp(28px,6vw,48px);
    margin:0; letter-spacing:5px; font-weight:900;
  }
  header h1 .stamp{
    display:inline-block; color:var(--stamp);
    border:3px solid var(--stamp); border-radius:6px;
    padding:2px 10px; transform:rotate(-3deg); margin-right:10px;
  }
  header p{color:var(--muted); font-size:13px; letter-spacing:1.5px; margin-top:6px;}

  .layout{display:grid; grid-template-columns:1fr 1fr; gap:20px;}
  @media (max-width:820px){ .layout{grid-template-columns:1fr;} }

  .card{
    background:#fffefb; border:1.5px solid var(--line); border-radius:4px;
    padding:16px; position:relative; box-shadow:6px 6px 0 rgba(0,0,0,0.08);
  }
  .card::before{
    content:attr(data-tag); position:absolute; top:-13px; left:16px;
    background:var(--ink); color:var(--paper); font-size:11px;
    letter-spacing:2.5px; padding:3px 10px; border-radius:2px;
  }
  .video-box{
    position:relative; width:100%; aspect-ratio:4/3; background:#111;
    border-radius:3px; overflow:hidden; border:1px solid #000;
  }
  video, canvas.overlay{
    position:absolute; top:0; left:0; width:100%; height:100%;
    object-fit:cover; transform:scaleX(-1);
  }
  .badge{
    position:absolute; bottom:9px; left:9px; background:rgba(0,0,0,0.65);
    color:#fff; padding:5px 11px; border-radius:20px; font-size:12px;
    letter-spacing:1px; display:flex; gap:7px; align-items:center;
  }
  .badge .dot{width:7px;height:7px;border-radius:50%;background:var(--green);}
  .controls{margin-top:12px; display:flex; gap:8px; flex-wrap:wrap;}
  button{
    font-family:inherit; border:1.5px solid var(--ink); background:var(--gold);
    color:var(--ink); padding:8px 16px; border-radius:3px; font-size:13px;
    letter-spacing:1.5px; cursor:pointer; font-weight:700; transition:transform .12s ease;
  }
  button:hover{transform:translateY(-2px);}
  button:active{transform:translateY(0);}
  button.secondary{background:#fff;}
  button.tiny{padding:5px 10px; font-size:11px;}
  button:disabled{opacity:.5; cursor:not-allowed; transform:none;}

  .status-line{margin-top:8px; font-size:12.5px; color:var(--muted); min-height:16px; line-height:1.6;}

  .result-title{display:flex; align-items:baseline; justify-content:space-between; margin-bottom:10px;}
  .result-title .label{font-size:20px; font-weight:900;}
  .result-title .conf{font-size:11px; color:var(--muted);}

  .meme-grid{display:grid; grid-template-columns:repeat(3,1fr); gap:8px;}
  .meme-cell{
    aspect-ratio:1; border:1.5px solid var(--line); border-radius:6px;
    overflow:hidden; position:relative; background:#f4efe4;
  }
  .meme-cell img{width:100%; height:100%; object-fit:cover; display:block;}
  .meme-cell.seed{
    display:flex; align-items:center; justify-content:center; font-size:36px;
    border-style:dashed; color:var(--muted);
  }
  .meme-cell .who{
    position:absolute; bottom:0; left:0; right:0; background:rgba(0,0,0,0.55);
    color:#fff; font-size:9px; padding:2px 5px; letter-spacing:0.5px;
  }
  .empty-hint{color:var(--muted); font-size:12.5px; text-align:center; padding:26px 8px; line-height:1.9;}

  .upload-zone{
    margin-top:14px; padding-top:12px; border-top:1.5px dashed var(--line);
  }
  .upload-zone .row{display:flex; gap:8px; align-items:center; flex-wrap:wrap;}
  select{
    font-family:inherit; border:1.5px solid var(--ink); border-radius:3px;
    padding:7px 10px; font-size:13px; background:#fff;
  }
  .upload-note{font-size:11px; color:var(--muted); margin-top:6px; line-height:1.6;}
  #fileInput{display:none;}

  .lib-count{
    font-size:11px; color:var(--stamp); letter-spacing:1px; margin-top:2px;
  }
  footer{text-align:center; margin-top:26px; font-size:11px; color:var(--muted); letter-spacing:1px; line-height:1.8;}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1><span class="stamp">镜</span>表情镜 Meme Mirror</h1>
    <p>比划一个手势 · 做一个表情 · 索引出大家共享的同款表情包</p>
  </header>

  <div class="layout">
    <div class="card" data-tag="摄像头">
      <div class="video-box">
        <video id="video" autoplay playsinline muted></video>
        <canvas id="overlay" class="overlay"></canvas>
        <div class="badge"><span class="dot" id="liveDot"></span><span id="badgeText">未启动</span></div>
      </div>
      <div class="controls">
        <button id="startBtn">启动摄像头</button>
        <button id="stopBtn" class="secondary" disabled>停止</button>
      </div>
      <div class="status-line" id="statusLine">点击「启动摄像头」并允许权限。识别在本地浏览器完成；上传的表情包会存进所有人共享的图库。</div>

      <div class="upload-zone">
        <div class="row">
          <select id="tagSelect"></select>
          <button class="tiny secondary" id="uploadBtn">＋ 上传一张真实表情包到这个分类</button>
          <input type="file" id="fileInput" accept="image/*">
        </div>
        <div class="upload-note">上传的图片会公开给所有打开这个网页的人查看，请不要上传隐私或不合适的内容。</div>
      </div>
    </div>

    <div class="card" data-tag="匹配结果">
      <div class="result-title">
        <div class="label" id="resultLabel">等待识别…</div>
        <div class="conf" id="resultConf"></div>
      </div>
      <div class="lib-count" id="libCount"></div>
      <div id="memeArea" style="margin-top:8px;">
        <div class="empty-hint">✋ 举起手掌、比个耶、点个赞、挥拳<br>😄 笑一笑、张嘴惊讶、皱眉<br>匹配的表情包会出现在这里</div>
      </div>
    </div>
  </div>

  <footer>手势模型：MediaPipe GestureRecognizer · 表情模型：MediaPipe FaceLandmarker（Blendshapes）<br>图库为共享存储，所有打开此页面的人共用同一批表情包</footer>
</div>

<script type="module">
import {
  GestureRecognizer, FaceLandmarker, FilesetResolver, DrawingUtils
} from "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.14/vision_bundle.mjs";
import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm";

// ==== 在这里填入你的 Supabase 项目信息（Settings → API） ====
const SUPABASE_URL = "https://eznngkxpxmrthyclvzmv.supabase.co";
const SUPABASE_ANON_KEY = "sb_publishable_1QbYeQhwTJ--FG6Qwai_hA_c2xV2Xon";
// ============================================================
const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

const video = document.getElementById('video');
const overlay = document.getElementById('overlay');
const ctx = overlay.getContext('2d');
const startBtn = document.getElementById('startBtn');
const stopBtn = document.getElementById('stopBtn');
const statusLine = document.getElementById('statusLine');
const badgeText = document.getElementById('badgeText');
const liveDot = document.getElementById('liveDot');
const resultLabel = document.getElementById('resultLabel');
const resultConf = document.getElementById('resultConf');
const memeArea = document.getElementById('memeArea');
const libCount = document.getElementById('libCount');
const tagSelect = document.getElementById('tagSelect');
const uploadBtn = document.getElementById('uploadBtn');
const fileInput = document.getElementById('fileInput');

let gestureRecognizer, faceLandmarker;
let stream = null, running = false, rafId = null, lastVideoTime = -1;
let currentCategory = 'None';

const CATEGORIES = {
  Thumb_Up:   '点赞 👍',
  Thumb_Down: '点踩 👎',
  Victory:    '比耶 ✌️',
  Open_Palm:  '举手/摊手 ✋',
  Closed_Fist:'握拳 ✊',
  ILoveYou:   '比心 🤟',
  Pointing_Up:'食指上指 ☝️',
  happy:      '开心大笑 😄',
  smile:      '微笑 🙂',
  surprised:  '惊讶 😮',
  sad:        '难过 😢',
  angry:      '生气 😠',
  neutral:    '面无表情 😐',
  None:       '未识别到手势/表情'
};
const SEED_EMOJI = {
  Thumb_Up:'👍', Thumb_Down:'👎', Victory:'✌️', Open_Palm:'✋', Closed_Fist:'✊',
  ILoveYou:'🤟', Pointing_Up:'☝️', happy:'😄', smile:'🙂', surprised:'😮',
  sad:'😢', angry:'😠', neutral:'😐', None:'🤔'
};

// populate manual tag selector for uploads
Object.entries(CATEGORIES).forEach(([key, label]) => {
  if (key === 'None') return;
  const opt = document.createElement('option');
  opt.value = key; opt.textContent = label;
  tagSelect.appendChild(opt);
});

function setBadge(text, live){
  badgeText.textContent = text;
  liveDot.style.background = live ? '#4caf50' : '#c0392b';
}

// ---------- 共享存储：图库读写（Supabase） ----------
async function saveMeme(category, dataUrl){
  const { error } = await supabase.from('memes').insert({ category, image: dataUrl });
  if (error) throw error;
}
async function loadMemesForCategory(category, limit=6){
  const { data, error } = await supabase
    .from('memes')
    .select('category,image,created_at')
    .eq('category', category)
    .order('created_at', { ascending:false })
    .limit(limit);
  if (error){ console.error(error); return []; }
  return data || [];
}
async function countForCategory(category){
  const { count, error } = await supabase
    .from('memes')
    .select('*', { count:'exact', head:true })
    .eq('category', category);
  if (error){ console.error(error); return 0; }
  return count || 0;
}

async function renderResult(key, confidence){
  currentCategory = key;
  const title = CATEGORIES[key] || key;
  resultLabel.textContent = title;
  resultConf.textContent = confidence != null ? `置信度 ${(confidence*100).toFixed(0)}%` : '';

  const memes = key === 'None' ? [] : await loadMemesForCategory(key, 6);
  libCount.textContent = key === 'None' ? '' : `共享图库中该分类已有 ${ await countForCategory(key) } 张`;

  memeArea.innerHTML = '';
  const grid = document.createElement('div');
  grid.className = 'meme-grid';

  if (memes.length === 0){
    memeArea.innerHTML = `<div class="empty-hint">这个分类还没有人上传真实表情包 ${SEED_EMOJI[key]||''}<br>做出这个${key==='None'?'手势/表情':'动作'}后，用下方按钮上传第一张吧！</div>`;
    return;
  }
  memes.forEach(m => {
    const cell = document.createElement('div');
    cell.className = 'meme-cell';
    const img = document.createElement('img');
    img.src = m.image;
    cell.appendChild(img);
    grid.appendChild(cell);
  });
  memeArea.appendChild(grid);
}

async function initModels(){
  statusLine.textContent = '正在加载识别模型（首次加载需下载几 MB，请稍候）…';
  const vision = await FilesetResolver.forVisionTasks(
    "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.14/wasm"
  );
  gestureRecognizer = await GestureRecognizer.createFromOptions(vision, {
    baseOptions: {
      modelAssetPath: "https://storage.googleapis.com/mediapipe-models/gesture_recognizer/gesture_recognizer/float16/1/gesture_recognizer.task",
      delegate: "GPU"
    },
    runningMode: "VIDEO", numHands: 1
  });
  faceLandmarker = await FaceLandmarker.createFromOptions(vision, {
    baseOptions: {
      modelAssetPath: "https://storage.googleapis.com/mediapipe-models/face_landmarker/face_landmarker/float16/1/face_landmarker.task",
      delegate: "GPU"
    },
    outputFaceBlendshapes: true, runningMode: "VIDEO", numFaces: 1
  });
  statusLine.textContent = '模型加载完成，摄像头启动中…';
}

function classifyExpression(blendshapes){
  const m = {};
  blendshapes.forEach(b => m[b.categoryName] = b.score);
  const smileScore = ((m['mouthSmileLeft']||0) + (m['mouthSmileRight']||0)) / 2;
  const jawOpen = m['jawOpen'] || 0;
  const browDown = ((m['browDownLeft']||0) + (m['browDownRight']||0)) / 2;
  const browUp = m['browInnerUp'] || 0;
  const frown = ((m['mouthFrownLeft']||0) + (m['mouthFrownRight']||0)) / 2;
  const eyeWide = ((m['eyeWideLeft']||0) + (m['eyeWideRight']||0)) / 2;

  const candidates = [
    { key:'surprised', score: (jawOpen*0.6 + eyeWide*0.4 + browUp*0.3) },
    { key:'happy',     score: smileScore * (jawOpen > 0.25 ? 1.2 : 0.9) },
    { key:'smile',     score: smileScore * 0.8 },
    { key:'angry',     score: browDown*0.7 + frown*0.3 },
    { key:'sad',       score: frown*0.6 + browUp*0.2 },
  ];
  candidates.sort((a,b)=> b.score - a.score);
  const top = candidates[0];
  if (top.score < 0.28) return { key:'neutral', score: 1 - top.score };
  return { key: top.key, score: Math.min(top.score, 0.99) };
}

async function loop(){
  if (!running) return;
  if (video.currentTime !== lastVideoTime){
    lastVideoTime = video.currentTime;
    const now = performance.now();
    overlay.width = video.videoWidth;
    overlay.height = video.videoHeight;
    ctx.clearRect(0,0,overlay.width, overlay.height);
    const drawUtils = new DrawingUtils(ctx);
    let handled = false;

    const gResult = gestureRecognizer.recognizeForVideo(video, now);
    if (gResult.gestures && gResult.gestures.length > 0 && gResult.gestures[0].length > 0){
      const top = gResult.gestures[0][0];
      if (gResult.landmarks && gResult.landmarks[0]){
        drawUtils.drawConnectors(gResult.landmarks[0], GestureRecognizer.HAND_CONNECTIONS, { color:'#d9a441', lineWidth:3 });
        drawUtils.drawLandmarks(gResult.landmarks[0], { color:'#c0392b', radius:3 });
      }
      if (top.categoryName && top.categoryName !== 'None' && top.score > 0.55){
        await renderResult(top.categoryName, top.score);
        handled = true;
      }
    }
    if (!handled){
      const fResult = faceLandmarker.detectForVideo(video, now);
      if (fResult.faceBlendshapes && fResult.faceBlendshapes.length > 0){
        const shapes = fResult.faceBlendshapes[0].categories;
        const { key, score } = classifyExpression(shapes);
        await renderResult(key, score);
        handled = true;
      }
    }
    if (!handled) await renderResult('None', null);
  }
  rafId = requestAnimationFrame(loop);
}

startBtn.addEventListener('click', async () => {
  startBtn.disabled = true;
  try{
    if (!gestureRecognizer || !faceLandmarker) await initModels();
    stream = await navigator.mediaDevices.getUserMedia({ video: { width:640, height:480 }, audio:false });
    video.srcObject = stream;
    await video.play();
    setBadge('识别中', true);
    statusLine.textContent = '识别运行中：比划手势或做表情试试看。';
    running = true;
    stopBtn.disabled = false;
    loop();
  }catch(err){
    console.error(err);
    statusLine.textContent = '摄像头启动失败：' + (err.message || err);
    setBadge('启动失败', false);
    startBtn.disabled = false;
  }
});

stopBtn.addEventListener('click', () => {
  running = false;
  if (rafId) cancelAnimationFrame(rafId);
  if (stream){ stream.getTracks().forEach(t => t.stop()); stream = null; }
  ctx.clearRect(0,0,overlay.width, overlay.height);
  setBadge('已停止', false);
  statusLine.textContent = '已停止识别。可再次点击「启动摄像头」继续。';
  stopBtn.disabled = true;
  startBtn.disabled = false;
});

// ---------- 上传 ----------
uploadBtn.addEventListener('click', () => fileInput.click());

fileInput.addEventListener('change', async () => {
  const file = fileInput.files[0];
  if (!file) return;
  const category = tagSelect.value;
  uploadBtn.disabled = true;
  uploadBtn.textContent = '上传中…';
  try{
    const dataUrl = await resizeToDataUrl(file, 480);
    await saveMeme(category, dataUrl);
    statusLine.textContent = `已上传到「${CATEGORIES[category]}」分类，感谢贡献！`;
    if (currentCategory === category) await renderResult(category, null);
  }catch(e){
    console.error(e);
    statusLine.textContent = '上传失败：' + (e.message || e);
  }finally{
    uploadBtn.disabled = false;
    uploadBtn.textContent = '＋ 上传一张真实表情包到这个分类';
    fileInput.value = '';
  }
});

function resizeToDataUrl(file, maxSize){
  return new Promise((resolve, reject) => {
    const img = new Image();
    const reader = new FileReader();
    reader.onload = () => { img.src = reader.result; };
    reader.onerror = reject;
    img.onload = () => {
      let { width, height } = img;
      if (width > height && width > maxSize){ height *= maxSize/width; width = maxSize; }
      else if (height > maxSize){ width *= maxSize/height; height = maxSize; }
      const c = document.createElement('canvas');
      c.width = width; c.height = height;
      c.getContext('2d').drawImage(img, 0, 0, width, height);
      resolve(c.toDataURL('image/jpeg', 0.8));
    };
    img.onerror = reject;
    reader.readAsDataURL(file);
  });
}

// initial idle preview
renderResult('None', null);
</script>
</body>
</html>
